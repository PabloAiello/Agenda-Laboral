<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Laboral - Pablo Aiello</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>📅 Agenda Laboral</h1>
        <h2>Pablo Aiello</h2>
        <p>Organización de tareas, reuniones y recordatorios.</p>
    </header>

    <main>

        <section class="formulario">
            <h3>Nueva tarea</h3>

            <input type="text" id="titulo" placeholder="Título de la tarea">

            <textarea id="descripcion" placeholder="Descripción"></textarea>

            <label>Fecha</label>
            <input type="date" id="fecha">

            <label>Hora</label>
            <input type="time" id="hora">

            <button id="agregar">➕ Agregar tarea</button>
        </section>

        <section class="agenda">
            <h3>📋 Próximas tareas</h3>

            <ul id="listaTareas">
                <li>No hay tareas pendientes.</li>
            </ul>
        </section>

    </main>

    <footer>
        <p>Agenda Laboral © 2026 - Pablo Aiello</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
